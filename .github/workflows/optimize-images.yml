name: 이미지 자동 압축

on:
  push:
    paths:
      - 'assets/images/**'

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 리포지토리 체크아웃
        uses: actions/checkout@v4

      - name: 이미지 최적화 도구 설치
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jpegoptim optipng

      - name: JPG 이미지 압축
        run: |
          find assets/images -type f \( -iname '*.jpg' -o -iname '*.jpeg' \) -size +200k -exec jpegoptim --max=85 --strip-all --all-progressive {} \;

      - name: PNG 이미지 압축
        run: |
          find assets/images -type f -iname '*.png' -size +200k -exec optipng -o2 -quiet {} \;

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A assets/images/
          if git diff --cached --quiet; then
            echo "압축할 이미지 없음, 스킵"
          else
            git commit -m "이미지 자동 압축 (GitHub Actions)"
            git push
          fi
